trigger:
  branches:
    include:
    - main

  paths:
    include:
    - resources/**

pool:
  vmImage: ubuntu-latest

steps:

- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: latest

- task: TerraformTask@5
  displayName: Terraform Init
  inputs:
    provider: azurerm
    command: init
    workingDirectory: $(System.DefaultWorkingDirectory)/resources

    backendServiceArm: ARM-service-Connection
    backendAzureRmResourceGroupName: tfstaterg
    backendAzureRmStorageAccountName: tfstatesa214
    backendAzureRmContainerName: tfstateblobcontainer214
    backendAzureRmKey: terraform.tfstate

- task: TerraformTask@5
  displayName: Terraform Validate
  inputs:
    provider: azurerm
    command: validate
    workingDirectory: $(System.DefaultWorkingDirectory)/resources
    environmentServiceNameAzureRM: ARM-service-Connection

- task: TerraformTask@5
  displayName: Terraform Plan
  inputs:
    provider: azurerm
    command: plan
    workingDirectory: $(System.DefaultWorkingDirectory)/resources
    environmentServiceNameAzureRM: ARM-service-Connection
    commandOptions: '-out=tfplan'

- task: TerraformTask@5
  displayName: Terraform Apply
  inputs:
    provider: azurerm
    command: apply
    workingDirectory: $(System.DefaultWorkingDirectory)/resources
    environmentServiceNameAzureRM: ARM-service-Connection
    commandOptions: 'tfplan -auto-approve'